# ─────────────────────────────────────────────────────────────
# eventi-dtd — Development / Staging overrides
#
# Usage:
#   helm install videocall ./infra/helm/eventi-dtd \
#     -f values.yaml -f values-dev.yaml -n videocall-test
# ─────────────────────────────────────────────────────────────

app:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

postgresql:
  enabled: true
  primary:
    persistence:
      size: 5Gi
      storageClass: ""

jitsi:
  enabled: true
