{{- if .Values.metrics.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "eventi-dtd.fullname" . }}
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    {{- with .Values.metrics.prometheusRule.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  groups:
    - name: eventi-dtd.rules
      rules:
        # App availability
        - alert: EventiDtdDown
          expr: up{job=~".*eventi.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "eventi-dtd is down"
            description: "The eventi-dtd application has been unreachable for more than 2 minutes."

        # High latency
        - alert: EventiDtdHighLatency
          expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{app="eventi-dtd"}[5m])) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P95 latency on eventi-dtd"
            description: "The 95th percentile response time has exceeded 2 seconds for 5 minutes. Current value: {{`{{ $value | humanizeDuration }}`}}"

        # High error rate
        - alert: EventiDtdHighErrorRate
          expr: |
            (
              rate(http_requests_total{app="eventi-dtd",status_code=~"5.."}[5m])
              /
              rate(http_requests_total{app="eventi-dtd"}[5m])
            ) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on eventi-dtd"
            description: "More than 5% of requests are returning 5xx errors. Current rate: {{`{{ $value | humanizePercentage }}`}}"

        # Database unreachable (metric disappears)
        - alert: EventiDtdDatabaseDown
          expr: absent(eventi_active_events{app="eventi-dtd"})
          for: 3m
          labels:
            severity: critical
          annotations:
            summary: "eventi-dtd database may be down"
            description: "The eventi_active_events metric has disappeared, which likely means the database is unreachable."

        # JVB high stress
        - alert: JvbHighStress
          expr: eventi_jvb_stress_level{app="eventi-dtd"} > 0.8
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "JVB stress level is high"
            description: "The Jitsi Videobridge stress level has been above 80% for 3 minutes. Current: {{`{{ $value | humanizePercentage }}`}}. Consider scaling up JVB replicas."

        # JVB scaling stuck
        - alert: JvbScalingStuck
          expr: eventi_jvb_participants{app="eventi-dtd"} > 0 and eventi_jvb_stress_level{app="eventi-dtd"} > 0.9
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "JVB is overloaded with active participants"
            description: "There are active participants but JVB stress is above 90% for 5 minutes. Scaling may be stuck or insufficient."

        # Jibri unavailable (recording configured but no Jibri metrics)
        - alert: JibriUnavailable
          expr: absent(jibri_health_status{namespace="{{ .Release.Namespace }}"}) and on() count(eventi_active_events{app="eventi-dtd"}) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Jibri recording service unavailable"
            description: "Jibri health metrics are not being reported while the application is running."

        # High event loop lag
        - alert: HighEventLoopLag
          expr: nodejs_eventloop_lag_seconds{app="eventi-dtd"} > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High Node.js event loop lag"
            description: "The event loop lag has exceeded 500ms for 2 minutes. Current: {{`{{ $value | humanizeDuration }}`}}. This may indicate CPU saturation."

    {{- with .Values.metrics.prometheusRule.rules }}
    - name: eventi-dtd.custom
      rules:
        {{- toYaml . | nindent 8 }}
    {{- end }}
{{- end }}
