{{- if and .Values.jitsi.enabled (eq (default "simple" .Values.jitsi.mode) "full") .Values.jvbScaler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-jvb-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
spec:
  schedule: {{ .Values.jvbScaler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 60
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "eventi-dtd.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: jvb-scaler
        spec:
          serviceAccountName: {{ include "eventi-dtd.fullname" . }}-scaler
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.app.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.app.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.app.tolerations }}
          tolerations:
            {{- toYaml .Values.app.tolerations | nindent 12 }}
          {{- end }}
          containers:
            - name: scaler
              image: {{ .Values.jvbScaler.image | default "bitnami/kubectl:1.29" }}
              command:
                - /bin/sh
                - -c
                - |
                  TS=$(date -u '+%Y-%m-%d %H:%M:%S')
                  log() { echo "[$TS] JVB Scaler: $1"; }

                  log "Checking..."

                  {{- if .Values.jvbScaler.jvbDeploymentName }}
                  JVB_DEPLOY="{{ .Values.jvbScaler.jvbDeploymentName }}"
                  {{- else }}
                  # Auto-detect JVB deployment by label
                  JVB_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                    -l "app.kubernetes.io/component=jvb" \
                    -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

                  if [ -z "$JVB_DEPLOY" ]; then
                    # Fallback: find by name pattern
                    JVB_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                      -o name 2>/dev/null | grep -i jvb | head -1 | sed 's|deployment.apps/||')
                  fi
                  {{- end }}

                  if [ -z "$JVB_DEPLOY" ]; then
                    log "ERROR: Cannot find JVB deployment"
                    exit 1
                  fi

                  log "Found deployment $JVB_DEPLOY"

                  APP_URL="{{ include "eventi-dtd.internalUrl" . }}"
                  RESPONSE=$(wget -qO- "${APP_URL}/api/internal/jvb-desired-replicas" 2>/dev/null)

                  if [ -z "$RESPONSE" ]; then
                    log "ERROR: Empty response from API — defaulting to 0"
                    DESIRED=0
                  else
                    log "API response: $RESPONSE"
                    # Parse desired from JSON response
                    DESIRED=$(echo "$RESPONSE" | grep -o '"desired":[0-9]*' | grep -o '[0-9]*' || echo "0")
                  fi

                  CURRENT=$(kubectl get deployment "$JVB_DEPLOY" -n {{ .Release.Namespace }} \
                    -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")

                  log "Current replicas: $CURRENT, Desired: $DESIRED"

                  if [ "$DESIRED" != "$CURRENT" ]; then
                    log "Scaling JVB from $CURRENT to $DESIRED"
                    kubectl scale deployment "$JVB_DEPLOY" \
                      -n {{ .Release.Namespace }} --replicas="$DESIRED"
                    log "Scale command completed (exit $?)"
                  else
                    log "No change needed"
                  fi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "eventi-dtd.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name: {{ include "eventi-dtd.fullname" . }}-scaler
    namespace: {{ .Release.Namespace }}
{{- end }}
