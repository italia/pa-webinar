{{- if and .Values.jitsi.enabled (eq (default "simple" .Values.jitsi.mode) "full") .Values.jvbScaler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-jvb-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
spec:
  schedule: {{ .Values.jvbScaler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "eventi-dtd.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: jvb-scaler
        spec:
          serviceAccountName: {{ include "eventi-dtd.fullname" . }}-scaler
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.app.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.app.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.app.tolerations }}
          tolerations:
            {{- toYaml .Values.app.tolerations | nindent 12 }}
          {{- end }}
          containers:
            - name: scaler
              image: {{ .Values.jvbScaler.image | default "bitnami/kubectl:latest" }}
              command:
                - /bin/sh
                - -c
                - |
                  log() { echo "[$(date -u '+%Y-%m-%d %H:%M:%S')] JVB Scaler: $1"; }

                  # ── Find JVB deployment ────────────────────────────
                  {{- if .Values.jvbScaler.jvbDeploymentName }}
                  JVB_DEPLOY="{{ .Values.jvbScaler.jvbDeploymentName }}"
                  {{- else }}
                  JVB_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                    -l "app.kubernetes.io/component=jvb" \
                    -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -z "$JVB_DEPLOY" ]; then
                    JVB_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                      -o name 2>/dev/null | grep -i jvb | head -1 | sed 's|deployment.apps/||')
                  fi
                  {{- end }}

                  if [ -z "$JVB_DEPLOY" ]; then
                    log "ERROR: Cannot find JVB deployment"
                    exit 1
                  fi
                  log "Found deployment: $JVB_DEPLOY"

                  CURRENT=$(kubectl get deployment "$JVB_DEPLOY" -n {{ .Release.Namespace }} \
                    -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                  READY=$(kubectl get deployment "$JVB_DEPLOY" -n {{ .Release.Namespace }} \
                    -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                  # readyReplicas is omitted (empty string) when 0; normalise.
                  READY=${READY:-0}
                  log "Deployment state: spec=$CURRENT ready=$READY"

                  # ── Phase 2: Reactive — aggregate /colibri/stats across ALL JVB pods ──
                  # A single hit to the JVB Service LB only reaches one pod, so with
                  # CURRENT>1 the reported participants/bitrate/conferences reflect
                  # that one pod's slice — the rest show zero. We instead list every
                  # JVB pod and exec curl on each, summing numeric fields. The app
                  # pod doesn't have the RBAC for this; the scaler does.
                  POLL_OK=0
                  POLL_FAIL=0
                  SUM_PARTICIPANTS=0
                  SUM_CONFERENCES=0
                  SUM_BIT_DOWN=0
                  SUM_BIT_UP=0
                  SUM_AUDIO_SENDERS=0
                  SUM_VIDEO_SENDERS=0
                  SUM_OCTO_CONF=0
                  SUM_OCTO_EP=0
                  SUM_OCTO_SEND=0
                  SUM_OCTO_RECV=0
                  MAX_STRESS_MILLI=0        # stress_level * 1000 — POSIX sh has no floats
                  MAX_LARGEST_CONF=0

                  # Extract a numeric field from a JSON stats blob. Handles integers
                  # (participants) and fractional values (stress_level). Prints empty
                  # when missing. No `jq` — bitnami/kubectl ships minimal tooling.
                  extract_num() {
                    echo "$1" | grep -o "\"$2\":[0-9.]*" | head -1 | sed "s/^\"$2\"://" || true
                  }

                  if [ "$CURRENT" -gt 0 ]; then
                    JVB_PODS=$(kubectl get pods -n {{ .Release.Namespace }} \
                      -l "app.kubernetes.io/component=jvb" \
                      --field-selector=status.phase=Running \
                      -o jsonpath='{range .items[*]}{.metadata.name}{"\n"}{end}' 2>/dev/null)

                    for JVB_POD in $JVB_PODS; do
                      [ -z "$JVB_POD" ] && continue
                      # NOTE: don't pass --request-timeout to `kubectl exec` here.
                      # With that flag kubectl silently discards the in-cluster
                      # kubeconfig and tries localhost:8080 (observed: "dial tcp
                      # [::1]:8080: connect: connection refused"), turning every
                      # probe into pods_fail. The curl --max-time caps the inner
                      # call; activeDeadlineSeconds on the CronJob caps the whole
                      # tick at 120s, which is enough for ≤6 pod probes.
                      STATS=$(kubectl exec -n {{ .Release.Namespace }} "$JVB_POD" \
                        -- curl -sf --max-time 3 "http://127.0.0.1:8080/colibri/stats" 2>/dev/null || true)

                      if [ -z "$STATS" ]; then
                        POLL_FAIL=$((POLL_FAIL + 1))
                        continue
                      fi
                      POLL_OK=$((POLL_OK + 1))

                      P=$(extract_num "$STATS" participants); P=${P:-0}
                      C=$(extract_num "$STATS" conferences); C=${C:-0}
                      BD=$(extract_num "$STATS" bit_rate_download); BD=${BD:-0}
                      BU=$(extract_num "$STATS" bit_rate_upload); BU=${BU:-0}
                      AS=$(extract_num "$STATS" endpoints_sending_audio); AS=${AS:-0}
                      VS=$(extract_num "$STATS" endpoints_sending_video); VS=${VS:-0}
                      LC=$(extract_num "$STATS" largest_conference); LC=${LC:-0}
                      OC=$(extract_num "$STATS" octo_conferences); OC=${OC:-0}
                      OE=$(extract_num "$STATS" octo_endpoints); OE=${OE:-0}
                      OS=$(extract_num "$STATS" octo_send_bitrate); OS=${OS:-0}
                      OR=$(extract_num "$STATS" octo_receive_bitrate); OR=${OR:-0}
                      SL=$(extract_num "$STATS" stress_level); SL=${SL:-0}

                      # Stress is documented to be in [0,1] but JVB has been
                      # observed returning much larger values on freshly-started
                      # or recently-cycled pods (e.g. 7-8 on an idle bridge),
                      # which would amplify into spurious reactive scale-ups.
                      # Two safeguards:
                      #   1. Cap per-pod stress to 1.0.
                      #   2. Ignore stress from pods with zero participants.
                      #      Stress on an empty bridge is meaningless for
                      #      reactive capacity decisions — the predictive
                      #      signal already covers that event's provisioning.
                      # Multiply by 1000 and truncate so POSIX `-gt` can compare.
                      if [ "$P" -gt 0 ] 2>/dev/null; then
                        SL_MILLI=$(awk "BEGIN{v=($SL); if(v>1)v=1; if(v<0)v=0; printf \"%d\", v*1000}" 2>/dev/null || echo 0)
                      else
                        SL_MILLI=0
                      fi

                      SUM_PARTICIPANTS=$((SUM_PARTICIPANTS + P))
                      SUM_CONFERENCES=$((SUM_CONFERENCES + C))
                      SUM_BIT_DOWN=$((SUM_BIT_DOWN + BD))
                      SUM_BIT_UP=$((SUM_BIT_UP + BU))
                      SUM_AUDIO_SENDERS=$((SUM_AUDIO_SENDERS + AS))
                      SUM_VIDEO_SENDERS=$((SUM_VIDEO_SENDERS + VS))
                      SUM_OCTO_CONF=$((SUM_OCTO_CONF + OC))
                      SUM_OCTO_EP=$((SUM_OCTO_EP + OE))
                      SUM_OCTO_SEND=$((SUM_OCTO_SEND + OS))
                      SUM_OCTO_RECV=$((SUM_OCTO_RECV + OR))
                      [ "$LC" -gt "$MAX_LARGEST_CONF" ] 2>/dev/null && MAX_LARGEST_CONF=$LC
                      [ "$SL_MILLI" -gt "$MAX_STRESS_MILLI" ] 2>/dev/null && MAX_STRESS_MILLI=$SL_MILLI
                    done

                    log "JVB aggregate: pods_ok=$POLL_OK pods_fail=$POLL_FAIL participants=$SUM_PARTICIPANTS conferences=$SUM_CONFERENCES bitDown=$SUM_BIT_DOWN bitUp=$SUM_BIT_UP largest=$MAX_LARGEST_CONF stressMilli=$MAX_STRESS_MILLI"
                  fi

                  # Build the aggregated query-string chunk only when at least one
                  # pod responded. Without that signal the API falls back to its
                  # own single-pod probe and the snapshot is marked non-aggregated.
                  AGG_PARAMS=""
                  STRESS_FLOAT=""
                  if [ "$POLL_OK" -gt 0 ]; then
                    STRESS_FLOAT=$(awk "BEGIN{printf \"%.6f\", $MAX_STRESS_MILLI/1000}" 2>/dev/null || echo 0)
                    AGG_PARAMS="&pollSuccesses=${POLL_OK}&pollFailures=${POLL_FAIL}"
                    AGG_PARAMS="${AGG_PARAMS}&participants=${SUM_PARTICIPANTS}"
                    AGG_PARAMS="${AGG_PARAMS}&conferences=${SUM_CONFERENCES}"
                    AGG_PARAMS="${AGG_PARAMS}&stressLevel=${STRESS_FLOAT}"
                    AGG_PARAMS="${AGG_PARAMS}&bitRateDownKbps=${SUM_BIT_DOWN}"
                    AGG_PARAMS="${AGG_PARAMS}&bitRateUpKbps=${SUM_BIT_UP}"
                    AGG_PARAMS="${AGG_PARAMS}&endpointsSendingAudio=${SUM_AUDIO_SENDERS}"
                    AGG_PARAMS="${AGG_PARAMS}&endpointsSendingVideo=${SUM_VIDEO_SENDERS}"
                    AGG_PARAMS="${AGG_PARAMS}&largestConference=${MAX_LARGEST_CONF}"
                    AGG_PARAMS="${AGG_PARAMS}&octoConferences=${SUM_OCTO_CONF}"
                    AGG_PARAMS="${AGG_PARAMS}&octoEndpoints=${SUM_OCTO_EP}"
                    AGG_PARAMS="${AGG_PARAMS}&octoSendBitrateBps=${SUM_OCTO_SEND}"
                    AGG_PARAMS="${AGG_PARAMS}&octoReceiveBitrateBps=${SUM_OCTO_RECV}"
                    # Legacy stress_level param kept for older route handlers that
                    # still look for it; harmless with the new code path.
                    AGG_PARAMS="${AGG_PARAMS}&stress_level=${STRESS_FLOAT}"
                  fi

                  # ── Phase 1: Predictive — query the app API ───────
                  # Forward spec/ready replica counts + aggregated traffic so the
                  # API persists an authoritative snapshot to Redis. The public
                  # /api/status reads that snapshot instead of guessing from a
                  # single /colibri/stats hit (which only ever sees 1 pod).
                  APP_URL="{{ include "eventi-dtd.internalUrl" . }}"
                  RESPONSE=$(curl -sf \
                    -H "x-api-key: $CRON_API_KEY" \
                    "${APP_URL}/api/internal/jvb-desired-replicas?current=${CURRENT}&ready=${READY}${AGG_PARAMS}" 2>/dev/null)

                  if [ -z "$RESPONSE" ]; then
                    log "ERROR: Empty response from API — keeping current replicas ($CURRENT)"
                    exit 0
                  fi

                  log "API response: $RESPONSE"
                  DESIRED=$(echo "$RESPONSE" | grep -o '"desired":[0-9]*' | grep -o '[0-9]*' || echo "")

                  if [ -z "$DESIRED" ]; then
                    log "ERROR: Cannot parse desired from response — keeping current ($CURRENT)"
                    exit 0
                  fi

                  log "Current: $CURRENT, Desired: $DESIRED"

                  if [ "$DESIRED" != "$CURRENT" ]; then
                    log "Scaling JVB from $CURRENT to $DESIRED"
                    kubectl scale deployment "$JVB_DEPLOY" \
                      -n {{ .Release.Namespace }} --replicas="$DESIRED"
                    log "Scale command completed (exit $?)"
                  else
                    log "No change needed"
                  fi

                  # ── Jibri auto-scaling ──────────────────────────────
                  JIBRI_DESIRED=$(echo "$RESPONSE" | grep -o '"jibriDesired":[0-9]*' | grep -o '[0-9]*' || echo "")
                  if [ -n "$JIBRI_DESIRED" ]; then
                    JIBRI_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                      -l "app.kubernetes.io/component=jibri" \
                      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

                    if [ -z "$JIBRI_DEPLOY" ]; then
                      JIBRI_DEPLOY=$(kubectl get statefulsets -n {{ .Release.Namespace }} \
                        -l "app.kubernetes.io/component=jibri" \
                        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                      JIBRI_KIND="statefulset"
                    else
                      JIBRI_KIND="deployment"
                    fi

                    if [ -n "$JIBRI_DEPLOY" ]; then
                      JIBRI_CURRENT=$(kubectl get "$JIBRI_KIND" "$JIBRI_DEPLOY" \
                        -n {{ .Release.Namespace }} -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                      if [ "$JIBRI_DESIRED" != "$JIBRI_CURRENT" ]; then
                        log "Scaling Jibri ($JIBRI_KIND/$JIBRI_DEPLOY) from $JIBRI_CURRENT to $JIBRI_DESIRED"
                        kubectl scale "$JIBRI_KIND" "$JIBRI_DEPLOY" \
                          -n {{ .Release.Namespace }} --replicas="$JIBRI_DESIRED"
                      else
                        log "Jibri: no change ($JIBRI_CURRENT replicas)"
                      fi
                    else
                      log "Jibri: deployment/statefulset not found — skipping"
                    fi
                  fi
              env:
                - name: CRON_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "eventi-dtd.secretName" . }}
                      key: CRON_API_KEY
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "eventi-dtd.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name: {{ include "eventi-dtd.fullname" . }}-scaler
    namespace: {{ .Release.Namespace }}
{{- end }}
