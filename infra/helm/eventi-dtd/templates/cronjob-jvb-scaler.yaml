{{- if and .Values.jitsi.enabled (eq (default "simple" .Values.jitsi.mode) "full") .Values.jvbScaler.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-jvb-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
spec:
  schedule: {{ .Values.jvbScaler.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 120
      backoffLimit: 1
      template:
        metadata:
          labels:
            {{- include "eventi-dtd.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: jvb-scaler
        spec:
          serviceAccountName: {{ include "eventi-dtd.fullname" . }}-scaler
          automountServiceAccountToken: true
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.app.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.app.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.app.tolerations }}
          tolerations:
            {{- toYaml .Values.app.tolerations | nindent 12 }}
          {{- end }}
          containers:
            - name: scaler
              image: {{ .Values.jvbScaler.image | default "bitnami/kubectl:latest" }}
              command:
                - /bin/sh
                - -c
                - |
                  log() { echo "[$(date -u '+%Y-%m-%d %H:%M:%S')] JVB Scaler: $1"; }

                  # ── Find JVB deployment ────────────────────────────
                  {{- if .Values.jvbScaler.jvbDeploymentName }}
                  JVB_DEPLOY="{{ .Values.jvbScaler.jvbDeploymentName }}"
                  {{- else }}
                  JVB_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                    -l "app.kubernetes.io/component=jvb" \
                    -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)
                  if [ -z "$JVB_DEPLOY" ]; then
                    JVB_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                      -o name 2>/dev/null | grep -i jvb | head -1 | sed 's|deployment.apps/||')
                  fi
                  {{- end }}

                  if [ -z "$JVB_DEPLOY" ]; then
                    log "ERROR: Cannot find JVB deployment"
                    exit 1
                  fi
                  log "Found deployment: $JVB_DEPLOY"

                  CURRENT=$(kubectl get deployment "$JVB_DEPLOY" -n {{ .Release.Namespace }} \
                    -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")

                  # ── Phase 2: Reactive — query JVB colibri stats ───
                  STRESS=""
                  STRESS_PARAM=""
                  if [ "$CURRENT" -gt 0 ]; then
                    # Find a running JVB pod to query stats
                    JVB_POD=$(kubectl get pods -n {{ .Release.Namespace }} \
                      -l "app.kubernetes.io/component=jvb" \
                      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

                    if [ -n "$JVB_POD" ]; then
                      STATS=$(kubectl exec -n {{ .Release.Namespace }} "$JVB_POD" \
                        -- curl -sf "http://127.0.0.1:8080/colibri/stats" 2>/dev/null || true)

                      if [ -n "$STATS" ]; then
                        STRESS=$(echo "$STATS" | grep -o '"stress_level":[0-9.]*' | grep -o '[0-9.]*' || true)
                        PARTICIPANTS=$(echo "$STATS" | grep -o '"participants":[0-9]*' | grep -o '[0-9]*' || true)
                        CONFERENCES=$(echo "$STATS" | grep -o '"conferences":[0-9]*' | grep -o '[0-9]*' || true)
                        VIDEO_CH=$(echo "$STATS" | grep -o '"video_channels":[0-9]*' | grep -o '[0-9]*' || true)
                        log "JVB stats: stress=${STRESS:-?} participants=${PARTICIPANTS:-0} conferences=${CONFERENCES:-0} video_channels=${VIDEO_CH:-0}"
                      fi
                    fi

                    if [ -n "$STRESS" ]; then
                      STRESS_PARAM="&stress_level=$STRESS"
                    fi
                  fi

                  # ── Phase 1: Predictive — query the app API ───────
                  APP_URL="{{ include "eventi-dtd.internalUrl" . }}"
                  RESPONSE=$(curl -sf \
                    -H "x-api-key: $CRON_API_KEY" \
                    "${APP_URL}/api/internal/jvb-desired-replicas?_=1${STRESS_PARAM}" 2>/dev/null)

                  if [ -z "$RESPONSE" ]; then
                    log "ERROR: Empty response from API — keeping current replicas ($CURRENT)"
                    exit 0
                  fi

                  log "API response: $RESPONSE"
                  DESIRED=$(echo "$RESPONSE" | grep -o '"desired":[0-9]*' | grep -o '[0-9]*' || echo "")

                  if [ -z "$DESIRED" ]; then
                    log "ERROR: Cannot parse desired from response — keeping current ($CURRENT)"
                    exit 0
                  fi

                  log "Current: $CURRENT, Desired: $DESIRED"

                  if [ "$DESIRED" != "$CURRENT" ]; then
                    log "Scaling JVB from $CURRENT to $DESIRED"
                    kubectl scale deployment "$JVB_DEPLOY" \
                      -n {{ .Release.Namespace }} --replicas="$DESIRED"
                    log "Scale command completed (exit $?)"
                  else
                    log "No change needed"
                  fi

                  # ── Jibri auto-scaling ──────────────────────────────
                  JIBRI_DESIRED=$(echo "$RESPONSE" | grep -o '"jibriDesired":[0-9]*' | grep -o '[0-9]*' || echo "")
                  if [ -n "$JIBRI_DESIRED" ]; then
                    JIBRI_DEPLOY=$(kubectl get deployments -n {{ .Release.Namespace }} \
                      -l "app.kubernetes.io/component=jibri" \
                      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)

                    if [ -z "$JIBRI_DEPLOY" ]; then
                      JIBRI_DEPLOY=$(kubectl get statefulsets -n {{ .Release.Namespace }} \
                        -l "app.kubernetes.io/component=jibri" \
                        -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                      JIBRI_KIND="statefulset"
                    else
                      JIBRI_KIND="deployment"
                    fi

                    if [ -n "$JIBRI_DEPLOY" ]; then
                      JIBRI_CURRENT=$(kubectl get "$JIBRI_KIND" "$JIBRI_DEPLOY" \
                        -n {{ .Release.Namespace }} -o jsonpath='{.spec.replicas}' 2>/dev/null || echo "0")
                      if [ "$JIBRI_DESIRED" != "$JIBRI_CURRENT" ]; then
                        log "Scaling Jibri ($JIBRI_KIND/$JIBRI_DEPLOY) from $JIBRI_CURRENT to $JIBRI_DESIRED"
                        kubectl scale "$JIBRI_KIND" "$JIBRI_DEPLOY" \
                          -n {{ .Release.Namespace }} --replicas="$JIBRI_DESIRED"
                      else
                        log "Jibri: no change ($JIBRI_CURRENT replicas)"
                      fi
                    else
                      log "Jibri: deployment/statefulset not found — skipping"
                    fi
                  fi
              env:
                - name: CRON_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "eventi-dtd.secretName" . }}
                      key: CRON_API_KEY
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1001
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 10m
                  memory: 16Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "statefulsets/scale"]
    verbs: ["get", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-scaler
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
    app.kubernetes.io/component: jvb-scaler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "eventi-dtd.fullname" . }}-scaler
subjects:
  - kind: ServiceAccount
    name: {{ include "eventi-dtd.fullname" . }}-scaler
    namespace: {{ .Release.Namespace }}
{{- end }}
