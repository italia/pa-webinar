apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "eventi-dtd.fullname" . }}
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.app.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "eventi-dtd.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.app.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "eventi-dtd.selectorLabels" . | nindent 8 }}
        {{- with .Values.app.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "eventi-dtd.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.app.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.app.securityContext.pod | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "eventi-dtd.selectorLabels" . | nindent 14 }}
      initContainers:
        - name: db-migrate
          image: {{ include "eventi-dtd.migrationImage" . }}
          imagePullPolicy: {{ .Values.app.migration.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.app.securityContext.container | nindent 12 }}
          command: ["npx", "prisma", "migrate", "deploy"]
          workingDir: /workspace/app
          envFrom:
            - configMapRef:
                name: {{ include "eventi-dtd.fullname" . }}
            - secretRef:
                name: {{ include "eventi-dtd.secretName" . }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "eventi-dtd.image" . }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.app.securityContext.container | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "eventi-dtd.fullname" . }}
            - secretRef:
                name: {{ include "eventi-dtd.secretName" . }}
          env:
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NODE_ENV
              value: "production"
            {{- if .Values.jitsi.enabled }}
            - name: JVB_HEALTH_URL
              value: {{ .Values.jitsi.jvbHealthUrl | default (printf "http://%s-jitsi-meet-jvb:8080" .Release.Name) | quote }}
            - name: JIBRI_HEALTH_URL
              value: {{ .Values.jitsi.jibriHealthUrl | default (printf "http://%s-jitsi-meet-jibri:2222" .Release.Name) | quote }}
            {{- end }}
          {{- with .Values.app.probes.startup }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.app.probes.liveness }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.app.probes.readiness }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          volumeMounts:
            {{- toYaml .Values.app.extraVolumeMounts | nindent 12 }}
      volumes:
        {{- toYaml .Values.app.extraVolumes | nindent 8 }}
      {{- with .Values.app.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.app.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
