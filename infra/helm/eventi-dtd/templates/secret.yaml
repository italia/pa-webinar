{{/*
Secrets management — three modes:

  "existing"  — reference a pre-created Kubernetes Secret (default)
                No resources generated. The user must create the Secret manually.
  "external"  — use External Secrets Operator (Azure Key Vault, AWS SM, GCP SM)
                See external-secret.yaml template.
  "generate"  — chart creates Secret from values (dev/test ONLY, never production)
                See below.

Required Secret keys:
  DATABASE_URL, JITSI_JWT_SECRET, JITSI_JWT_APP_ID, JITSI_JWT_ISSUER,
  JITSI_JWT_AUDIENCE, APP_SECRET, ADMIN_API_KEY, PII_ENCRYPTION_KEY,
  CRON_API_KEY, SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER,
  SMTP_PASSWORD, SMTP_FROM, SMTP_FROM_NAME

Optional:
  REDIS_URL — required for multi-pod chat fan-out. When the redis
              subchart is enabled the chart derives the default below;
              leave empty and override only for external/managed Redis.
  POSTGRES_ADMIN_PASSWORD, POSTGRES_PASSWORD (if postgresql subchart enabled)
  REDIS_PASSWORD (if redis subchart enabled)

Storage (set one per domain, or reuse the same bucket with both):

  Files domain (event materials):
    AZURE_STORAGE_CONNECTION_STRING    — Azure Blob
    STORAGE_FILES_S3_ACCESS_KEY_ID     — S3 / MinIO / GCS / R2 / PSN
    STORAGE_FILES_S3_SECRET_ACCESS_KEY

  Recordings domain (Jibri + manual uploads):
    RECORDING_AZURE_CONNECTION_STRING  — Azure Blob
    RECORDING_S3_ACCESS_KEY_ID         — S3 / MinIO / GCS / R2 / PSN
    RECORDING_S3_SECRET_ACCESS_KEY

  Provider auto-detected from which env vars are present; override with
  STORAGE_FILES_PROVIDER or RECORDING_STORAGE_TYPE. Non-sensitive hints
  (bucket, region, endpoint, force-path-style) go in the ConfigMap.
*/}}
{{- if eq .Values.secrets.mode "generate" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.existingSecretName | default "videocall-secrets" }}
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook-weight: "-5"
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.generate }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
