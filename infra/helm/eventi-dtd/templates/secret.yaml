This chart does NOT create secrets — they must be provisioned externally
using Sealed Secrets, External Secrets Operator, or Azure Key Vault CSI.

The app.existingSecret value references a pre-existing Secret.

Required Secret structure:

apiVersion: v1
kind: Secret
metadata:
  name: eventi-dtd-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://eventi:***@host:5432/eventi_dtd"
  JITSI_JWT_SECRET: "..."
  JITSI_JWT_APP_ID: "eventi_dtd"
  JITSI_JWT_ISSUER: "eventi-dtd"
  JITSI_JWT_AUDIENCE: "jitsi"
  APP_SECRET: "..."
  ADMIN_API_KEY: "..."
  PII_ENCRYPTION_KEY: "..."  # 64 hex chars (32 bytes)
  CRON_API_KEY: "..."
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_USER: "..."
  SMTP_PASSWORD: "..."
  SMTP_FROM: "eventi@dominio.gov.it"
  SMTP_FROM_NAME: "Eventi DTD"
  # Optional:
  # AZURE_STORAGE_CONNECTION_STRING: "..."
  # AZURE_STORAGE_CONTAINER: "recordings"
  # POSTGRES_ADMIN_PASSWORD: "..."  (if postgresql subchart is enabled)
  # POSTGRES_PASSWORD: "..."        (if postgresql subchart is enabled)
