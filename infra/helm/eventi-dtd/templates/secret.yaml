{{/*
Secrets management — three modes:

  "existing"  — reference a pre-created Kubernetes Secret (default)
                No resources generated. The user must create the Secret manually.
  "external"  — use External Secrets Operator (Azure Key Vault, AWS SM, GCP SM)
                See external-secret.yaml template.
  "generate"  — chart creates Secret from values (dev/test ONLY, never production)
                See below.

Required Secret keys:
  DATABASE_URL, JITSI_JWT_SECRET, JITSI_JWT_APP_ID, JITSI_JWT_ISSUER,
  JITSI_JWT_AUDIENCE, APP_SECRET, ADMIN_API_KEY, PII_ENCRYPTION_KEY,
  CRON_API_KEY, SMTP_HOST, SMTP_PORT, SMTP_SECURE, SMTP_USER,
  SMTP_PASSWORD, SMTP_FROM, SMTP_FROM_NAME

Optional:
  AZURE_STORAGE_CONNECTION_STRING, AZURE_STORAGE_CONTAINER,
  POSTGRES_ADMIN_PASSWORD, POSTGRES_PASSWORD (if postgresql subchart enabled)
*/}}
{{- if eq .Values.secrets.mode "generate" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.existingSecretName | default "videocall-secrets" }}
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook-weight: "-5"
type: Opaque
stringData:
  {{- range $key, $value := .Values.secrets.generate }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
