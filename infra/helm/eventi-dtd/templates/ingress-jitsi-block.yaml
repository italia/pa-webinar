{{/*
Block direct browser access to the Jitsi Web landing page.
Jitsi must only be accessed via the IFrame API embedded in the portal.

Uses exact path matching (/) with a permanent redirect to the portal.
The Jitsi subchart Ingress (prefix /) still serves IFrame API paths
(/external_api.js, /libs/, /http-bind, etc.) — exact matches take
priority over prefix matches in nginx.

Only rendered when jitsi.enabled=true and jitsi web ingress is enabled.
Skipped when snippets are available (operator can use server-snippet instead).
*/}}
{{- if and .Values.jitsi.enabled (index .Values "jitsi-meet" "web" "ingress" "enabled") }}
{{- $appUrl := .Values.app.env.NEXT_PUBLIC_APP_URL | default "https://localhost:3000" }}
{{- $webIngress := index .Values "jitsi-meet" "web" "ingress" }}
{{- $hosts := $webIngress.hosts }}
{{- $tls := $webIngress.tls | default list }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eventi-dtd.fullname" . }}-jitsi-block
  labels:
    {{- include "eventi-dtd.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/permanent-redirect: {{ $appUrl | quote }}
spec:
  {{- if $webIngress.ingressClassName }}
  ingressClassName: {{ $webIngress.ingressClassName }}
  {{- end }}
  {{- if $tls }}
  tls:
    {{- range $tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          - path: /
            pathType: Exact
            backend:
              service:
                name: {{ include "eventi-dtd.fullname" $ }}-jitsi-meet-web
                port:
                  number: 80
          - path: /index.html
            pathType: Exact
            backend:
              service:
                name: {{ include "eventi-dtd.fullname" $ }}-jitsi-meet-web
                port:
                  number: 80
    {{- end }}
{{- end }}
