apiVersion: v2
name: pa-webinar
description: Piattaforma per eventi pubblici digitali della PA italiana
type: application
version: 0.1.1
appVersion: "0.1.0"
home: https://github.com/italia/pa-webinar
icon: https://italia.github.io/bootstrap-italia/docs/assets/img/favicons/favicon-32x32.png
keywords:
  - events
  - webinar
  - jitsi
  - nextjs
  - pubblica-amministrazione
  - design-system-italia
maintainers:
  - name: Dipartimento per la Trasformazione Digitale
    url: https://innovazione.gov.it

dependencies:
  # PostgreSQL — disable if using Azure Database for PostgreSQL
  - name: postgresql
    version: "~18.5.0"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled

  # Redis — pub/sub for real-time chat fan-out across app pods.
  # Disable and point REDIS_URL at an external/managed Redis for
  # production cloud deployments.
  - name: redis
    version: "~20.13.0"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled

  # Jitsi Meet — disable if using external Jitsi instance
  - name: jitsi-meet
    version: "~2.13.0"
    repository: https://jitsi-contrib.github.io/jitsi-helm/
    condition: jitsi.enabled
