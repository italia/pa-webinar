{{- if .Values.cronjobs.emailOutbox.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pa-webinar.fullname" . }}-email-outbox
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
    app.kubernetes.io/component: cronjob-email-outbox
spec:
  schedule: {{ .Values.cronjobs.emailOutbox.schedule | quote }}
  # Forbid overlap: if a previous run is still draining the queue, skip
  # this tick. The processor's row-level lease prevents double-sends even
  # across accidental overlap, but serializing keeps SMTP load predictable.
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      # GC dei Job terminati (successo E fallimento): senza TTL un Job fallito
      # resta visibile per giorni (failedJobsHistoryLimit) e tiene acceso
      # KubeJobFailed molto oltre il problema reale.
      ttlSecondsAfterFinished: {{ .Values.cronjobs.jobTtlSeconds | default 7200 }}
      backoffLimit: 1
      # L'endpoint può legittimamente drenare un batch da 50 email (~50s) e i
      # retry curl al cold-start consumano fino a ~35s: 55s uccideva il job a
      # metà drenaggio marcandolo Failed. concurrencyPolicy: Forbid evita
      # comunque l'accumulo (i tick durante una run lunga vengono saltati).
      activeDeadlineSeconds: 110
      template:
        metadata:
          labels:
            {{- include "pa-webinar.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: cronjob-email-outbox
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 100
            runAsGroup: 101
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.app.nodeSelector }}
          nodeSelector:
            {{- toYaml .Values.app.nodeSelector | nindent 12 }}
          {{- end }}
          {{- if .Values.app.tolerations }}
          tolerations:
            {{- toYaml .Values.app.tolerations | nindent 12 }}
          {{- end }}
          containers:
            - name: email-outbox
              image: {{ .Values.cronjobs.emailOutbox.image }}
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf --retry 3 --retry-delay 5 --retry-connrefused --connect-timeout 5 \
                    -H "x-api-key: $(CRON_API_KEY)" \
                    {{ include "pa-webinar.internalUrl" . }}/api/cron/email-outbox
              env:
                - name: CRON_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pa-webinar.secretName" . }}
                      key: CRON_API_KEY
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: 50m
                  memory: 32Mi
                limits:
                  cpu: 50m
                  memory: 32Mi
{{- end }}
