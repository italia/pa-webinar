{{- if .Values.networkPolicy.enabled }}
# ─────────────────────────────────────────────────────────────
# Default-deny + explicit allow-list for the pa-webinar pods.
#
# Egress is locked down to the small set of dependencies the app
# actually needs: DNS, Postgres, Redis, Jitsi Prosody (XMPP for JWT
# rooms), SMTP, recording object storage, and the HTTPS public web
# (so jose can fetch its remote JWKS and the deployment can reach
# external Jitsi instances when jitsi.enabled=false).
#
# Ingress is allowed from the configured ingress controller namespace
# and from Prometheus (so the ServiceMonitor scrape keeps working).
#
# CNI requirement: AKS clusters need the Azure Network Policy or
# Calico engine enabled — otherwise the cluster ignores
# NetworkPolicy objects. See docs/DEPLOYMENT.md.
# ─────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pa-webinar.fullname" . }}
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "pa-webinar.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from the configured ingress controller namespace.
    - from:
        {{- range .Values.networkPolicy.ingress.fromNamespaceSelectors }}
        - namespaceSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- with .Values.networkPolicy.ingress.fromPodSelectors }}
        {{- range . }}
        - podSelector:
            matchLabels:
              {{- toYaml . | nindent 14 }}
        {{- end }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port | default 3000 }}
    {{- if .Values.networkPolicy.ingress.allowMonitoring }}
    # Prometheus scrape (ServiceMonitor) — only opens the metrics port
    # which is the same as the service port; the /metrics endpoint is
    # auth-gated at the application layer.
    - from:
        - namespaceSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.ingress.monitoringNamespaceSelector | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port | default 3000 }}
    {{- end }}
  egress:
    # DNS — required for everything else to resolve.
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Postgres
    {{- with .Values.networkPolicy.egress.postgres }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .port | default 5432 }}
    {{- end }}
    # Redis
    {{- with .Values.networkPolicy.egress.redis }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        - protocol: TCP
          port: {{ .port | default 6379 }}
    {{- end }}
    # Jitsi (Prosody for JWT-authenticated room creation + web for
    # the IFrame source). Only effective when running in cluster;
    # external Jitsi is reached via the generic HTTPS rule below.
    {{- with .Values.networkPolicy.egress.jitsi }}
    - to:
        {{- toYaml .to | nindent 8 }}
      ports:
        {{- range .ports }}
        - protocol: {{ .protocol | default "TCP" }}
          port: {{ .port }}
        {{- end }}
    {{- end }}
    # SMTP — outbound mail to the configured relay.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.egress.smtpPort | default 587 }}
        {{- if .Values.networkPolicy.egress.allowImplicitTlsSmtp }}
        - protocol: TCP
          port: 465
        {{- end }}
    # HTTPS — recording object storage (Azure Blob / S3 / GCS),
    # remote Jitsi instances, JWKS endpoints, and any other outbound
    # we depend on. Limited to TCP/443.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              {{- with .Values.networkPolicy.egress.httpsExcept }}
              {{- toYaml . | nindent 14 }}
              {{- end }}
      ports:
        - protocol: TCP
          port: 443
{{- end }}
