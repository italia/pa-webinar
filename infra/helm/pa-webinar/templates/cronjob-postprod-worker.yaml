{{- if and .Values.postprod.enabled .Values.postprod.worker.enabled }}
# Worker template — this CronJob is created **suspended** and used as
# a Pod spec template by the postprod-orchestrator (`kubectl create
# job --from=cronjob/...`). It's never executed on its own schedule.
# The "@yearly" schedule is a never-fires placeholder; we also set
# suspend=true so even that one tick is skipped.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pa-webinar.fullname" . }}-postprod-worker
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
    app.kubernetes.io/component: postprod-worker
spec:
  schedule: "@yearly"
  suspend: true
  jobTemplate:
    metadata:
      labels:
        {{- include "pa-webinar.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postprod-worker
    spec:
      # One Pod per job, no retries inside the Job (the queue retries
      # via PostprodJob.attempts).
      backoffLimit: 0
      activeDeadlineSeconds: {{ .Values.postprod.worker.activeDeadlineSeconds | default 3600 }}
      ttlSecondsAfterFinished: {{ .Values.postprod.worker.ttlSecondsAfterFinished | default 600 }}
      template:
        metadata:
          labels:
            {{- include "pa-webinar.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: postprod-worker
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          # The worker runs on a scale-from-zero GPU node where the (private)
          # worker image is never cached, so it MUST present pull credentials —
          # unlike the orchestrator/reclaim/retention cronjobs which reuse the
          # app image already cached on the app nodes. Inherit the app's pull
          # secret unless a worker-specific one is set.
          {{- with (.Values.postprod.worker.imagePullSecrets | default .Values.app.imagePullSecrets) }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.postprod.worker.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.postprod.worker.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.postprod.worker.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          {{- if .Values.postprod.worker.modelsPvc }}
          volumes:
            - name: models
              persistentVolumeClaim:
                claimName: {{ .Values.postprod.worker.modelsPvc }}
            - name: work
              emptyDir:
                sizeLimit: {{ .Values.postprod.worker.workSizeLimit | default "20Gi" }}
          {{- else }}
          volumes:
            - name: models
              emptyDir:
                sizeLimit: {{ .Values.postprod.worker.modelsSizeLimit | default "30Gi" }}
            - name: work
              emptyDir:
                sizeLimit: {{ .Values.postprod.worker.workSizeLimit | default "20Gi" }}
          {{- end }}
          containers:
            - name: worker
              image: {{ .Values.postprod.worker.image }}
              imagePullPolicy: {{ .Values.postprod.worker.imagePullPolicy | default "IfNotPresent" }}
              env:
                - name: APP_INTERNAL_URL
                  value: {{ include "pa-webinar.internalUrl" . | quote }}
                # The container runs read-only / non-root, so /tmp isn't
                # writable: Python's tempfile would raise "No usable
                # temporary directory". Point TMPDIR at the writable
                # scratch emptyDir mounted at /work (where the worker
                # downloads the source MP4 and stages artifacts anyway).
                - name: TMPDIR
                  value: /work
                - name: CRON_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "pa-webinar.secretName" . }}
                      key: CRON_API_KEY
                # Pyannote gated model needs the HF token. The Secret
                # must exist before this rolls out (see docs/POSTPROD.md).
                {{- if .Values.postprod.worker.hfTokenSecret }}
                - name: HF_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.postprod.worker.hfTokenSecret.name }}
                      key: {{ .Values.postprod.worker.hfTokenSecret.key | default "HF_TOKEN" }}
                {{- end }}
                {{- if .Values.postprod.worker.stub }}
                - name: WORKER_STUB
                  value: "1"
                {{- end }}
                {{- range $key, $value := .Values.postprod.worker.extraEnv }}
                - name: {{ $key }}
                  value: {{ $value | quote }}
                {{- end }}
              volumeMounts:
                - name: models
                  mountPath: /models
                - name: work
                  mountPath: /work
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop:
                    - ALL
              resources:
                requests:
                  cpu: {{ .Values.postprod.worker.resources.requests.cpu | default "2" }}
                  memory: {{ .Values.postprod.worker.resources.requests.memory | default "16Gi" }}
                  {{- if .Values.postprod.worker.gpu.enabled }}
                  nvidia.com/gpu: {{ .Values.postprod.worker.gpu.count | default 1 }}
                  {{- end }}
                limits:
                  cpu: {{ .Values.postprod.worker.resources.limits.cpu | default "8" }}
                  memory: {{ .Values.postprod.worker.resources.limits.memory | default "48Gi" }}
                  {{- if .Values.postprod.worker.gpu.enabled }}
                  nvidia.com/gpu: {{ .Values.postprod.worker.gpu.count | default 1 }}
                  {{- end }}
{{- end }}
