{{- if eq .Values.secrets.mode "external" }}
{{- $fullname := include "pa-webinar.fullname" . -}}
{{- $secretName := .Values.secrets.existingSecretName | default "videocall-secrets" -}}
{{- $provider := .Values.secrets.external.provider -}}
{{- $refreshInterval := .Values.secrets.external.refreshInterval | default "1h" -}}

{{/* ── Azure Key Vault ── */}}
{{- if eq $provider "azure-key-vault" }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ $fullname }}-vault
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  provider:
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: {{ .Values.secrets.external.azureKeyVault.vaultUrl | quote }}
      tenantId: {{ .Values.secrets.external.azureKeyVault.tenantId | quote }}
      serviceAccountRef:
        name: {{ include "pa-webinar.serviceAccountName" . }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-secrets
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $refreshInterval }}
  secretStoreRef:
    name: {{ $fullname }}-vault
    kind: SecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $k8sKey, $vaultKey := .Values.secrets.external.azureKeyVault.secretMappings }}
    - secretKey: {{ $k8sKey }}
      remoteRef:
        key: {{ $vaultKey }}
    {{- end }}
{{- end }}

{{/* ── AWS Secrets Manager ── */}}
{{- if eq $provider "aws-secrets-manager" }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ $fullname }}-vault
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.external.awsSecretsManager.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "pa-webinar.serviceAccountName" . }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-secrets
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $refreshInterval }}
  secretStoreRef:
    name: {{ $fullname }}-vault
    kind: SecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $k8sKey, $awsKey := .Values.secrets.external.awsSecretsManager.secretMappings }}
    - secretKey: {{ $k8sKey }}
      remoteRef:
        key: {{ $awsKey }}
    {{- end }}
{{- end }}

{{/* ── GCP Secret Manager ── */}}
{{- if eq $provider "gcp-secret-manager" }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ $fullname }}-vault
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  provider:
    gcpsm:
      projectID: {{ .Values.secrets.external.gcpSecretManager.projectID | quote }}
      auth:
        workloadIdentity:
          clusterLocation: ""  # Set per environment
          clusterName: ""      # Set per environment
          serviceAccountRef:
            name: {{ include "pa-webinar.serviceAccountName" . }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ $fullname }}-secrets
  labels:
    {{- include "pa-webinar.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ $refreshInterval }}
  secretStoreRef:
    name: {{ $fullname }}-vault
    kind: SecretStore
  target:
    name: {{ $secretName }}
    creationPolicy: Owner
  data:
    {{- range $k8sKey, $gcpKey := .Values.secrets.external.gcpSecretManager.secretMappings }}
    - secretKey: {{ $k8sKey }}
      remoteRef:
        key: {{ $gcpKey }}
    {{- end }}
{{- end }}

{{- end }}
