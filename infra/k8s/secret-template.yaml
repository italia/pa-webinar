# Secret template for pa-webinar
# DO NOT COMMIT WITH REAL VALUES
#
# In production, use one of:
# - External Secrets Operator (Azure Key Vault, AWS SM, GCP SM) — see Helm secrets.mode: "external"
# - Sealed Secrets
# - Manual: kubectl create secret generic videocall-secrets -n videocall --from-literal=...
#
apiVersion: v1
kind: Secret
metadata:
  name: videocall-secrets
  namespace: videocall  # Change to match your namespace
type: Opaque
stringData:
  # ── Database ──
  DATABASE_URL: "postgresql://user:password@host:5432/pa_webinar?sslmode=require"

  # ── Jitsi JWT ──
  JITSI_JWT_SECRET: ""           # Generate: openssl rand -hex 32
  JITSI_JWT_APP_ID: "pa_webinar"
  JITSI_JWT_ISSUER: "pa-webinar"
  JITSI_JWT_AUDIENCE: "jitsi"

  # ── Application ──
  APP_SECRET: ""                  # Generate: openssl rand -hex 32
  ADMIN_API_KEY: ""               # Choose a strong key for admin endpoints

  # ── SMTP ──
  # See docs/CONFIGURATION.md for provider-specific examples
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_SECURE: "true"
  SMTP_USER: ""
  SMTP_PASSWORD: ""
  SMTP_FROM: "eventi@your-domain.com"
  SMTP_FROM_NAME: "Eventi PA"

  # ── GDPR / PII encryption ──
  PII_ENCRYPTION_KEY: ""          # Generate: openssl rand -hex 32

  # ── Cron authentication ──
  CRON_API_KEY: ""                # Generate: openssl rand -hex 32

  # ── Object storage (for recordings) ──
  # Uncomment for your cloud provider:
  # AZURE_STORAGE_CONNECTION_STRING: ""
  # AZURE_STORAGE_CONTAINER: "recordings"
  # AWS_S3_BUCKET: ""
  # GCS_BUCKET: ""
