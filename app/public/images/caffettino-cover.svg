<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="il Caffettino del DTD">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7EFE4"/>
      <stop offset="0.55" stop-color="#E8D5B7"/>
      <stop offset="1" stop-color="#B88660"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.25" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>

  <!-- Steam -->
  <g stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M840 280 Q 820 230, 840 190 Q 860 150, 840 110"/>
    <path d="M960 260 Q 940 210, 960 170 Q 980 130, 960 90"/>
    <path d="M1080 280 Q 1100 240, 1080 200 Q 1060 160, 1080 120"/>
  </g>

  <!-- Cup -->
  <g filter="url(#shadow)">
    <!-- Saucer -->
    <ellipse cx="960" cy="760" rx="360" ry="40" fill="#3A2514"/>
    <ellipse cx="960" cy="752" rx="340" ry="28" fill="#5A3A22"/>

    <!-- Cup body -->
    <path d="M 680 380 L 720 740 Q 720 770 760 770 L 1160 770 Q 1200 770 1200 740 L 1240 380 Z"
          fill="#FFFFFF" stroke="#3A2514" stroke-width="6"/>
    <!-- Handle -->
    <path d="M 1240 420 Q 1360 420 1360 530 Q 1360 640 1240 640"
          fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round"/>
    <path d="M 1240 420 Q 1360 420 1360 530 Q 1360 640 1240 640"
          fill="none" stroke="#3A2514" stroke-width="6" stroke-linecap="round"/>

    <!-- Coffee surface -->
    <ellipse cx="960" cy="395" rx="275" ry="22" fill="#3A2514"/>
    <ellipse cx="960" cy="390" rx="272" ry="18" fill="#5C3A1E"/>
    <!-- Crema highlight -->
    <ellipse cx="890" cy="388" rx="60" ry="6" fill="#D9B68C" opacity="0.75"/>
  </g>

  <!-- Text block -->
  <g font-family="Titillium Web, 'Helvetica Neue', Arial, sans-serif" fill="#17324D">
    <text x="160" y="920" font-size="44" font-weight="600" letter-spacing="8" fill="#8B4513" opacity="0.8">DEL DTD</text>
    <text x="160" y="1010" font-size="96" font-weight="800">il Caffettino</text>
  </g>

  <!-- Tag pill -->
  <g transform="translate(160 120)">
    <rect width="180" height="58" rx="29" fill="#17324D"/>
    <text x="90" y="39" text-anchor="middle" font-family="Titillium Web, 'Helvetica Neue', Arial, sans-serif"
          font-size="26" font-weight="700" letter-spacing="4" fill="#FFFFFF">[OT]</text>
  </g>
</svg>
