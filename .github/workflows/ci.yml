name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Trigger manuale via UI / `gh workflow run ci.yml`. Utile quando
  # un sync event della PR viene saltato (raro, ma osservato — es. PR
  # #62 ha richiesto il dispatch manuale per far partire i check).
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: arc-runner-pa-webinar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --workspace=app
      - run: npx tsc --noEmit --project app/tsconfig.json

  test:
    name: Unit Tests
    runs-on: arc-runner-pa-webinar
    services:
      postgres:
        image: mirror.gcr.io/library/postgres:16-alpine
        env:
          POSTGRES_DB: pa_webinar_test
          POSTGRES_USER: eventi
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test --workspace=app
        env:
          DATABASE_URL: postgresql://eventi:test@localhost:5432/pa_webinar_test

  security:
    name: Security Scan
    runs-on: arc-runner-pa-webinar
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  license-check:
    name: License Compliance
    runs-on: arc-runner-pa-webinar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Check forbidden licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-3.0-only;SSPL-1.0" --excludePrivatePackages
      - name: Verify license-report.json is up to date
        run: |
          npm run license:report
          git diff --exit-code license-report.json || {
            echo "::error::license-report.json is out of date. Run 'npm run license:report' and commit the result."
            exit 1
          }

  migration-check:
    name: Migration Integrity
    runs-on: arc-runner-pa-webinar
    services:
      postgres:
        image: mirror.gcr.io/library/postgres:16-alpine
        env:
          POSTGRES_DB: pa_webinar_test
          POSTGRES_USER: eventi
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Apply migrations
        run: npx prisma migrate deploy --schema=app/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://eventi:test@localhost:5432/pa_webinar_test
      - name: Verify schema is in sync with migrations
        run: |
          npx prisma migrate diff \
            --from-migrations app/prisma/migrations \
            --to-schema-datamodel app/prisma/schema.prisma \
            --shadow-database-url postgresql://eventi:test@localhost:5432/pa_webinar_test \
            --exit-code
        env:
          DATABASE_URL: postgresql://eventi:test@localhost:5432/pa_webinar_test

  e2e:
    name: E2E Smoke Tests
    runs-on: arc-runner-pa-webinar
    needs: [lint, test]
    # E2E spins up the full docker-compose stack, which pulls Jitsi
    # (jitsi/web/prosody/jicofo/jvb) and mailpit images from Docker
    # Hub. Those aren't in the `library/*` namespace so they aren't
    # mirrored by mirror.gcr.io, and the shared ARC runner shares one
    # source IP — anonymous Docker Hub rate limit (100/6h) burns out
    # frequently. Until a Docker Hub authenticated secret pair lands
    # in repo settings (or we mirror these images to GHCR), the smoke
    # test is best-effort: a transient pull failure here doesn't
    # represent a code regression, so don't block PRs on it.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: app
      # The ghcr.io/actions/actions-runner image used by ARC ships docker CLI
      # but not the compose v2 plugin — install it on the fly so `docker compose`
      # works on the self-hosted runner the same way it does on ubuntu-latest.
      - uses: docker/setup-compose-action@v2
      # Authenticate to Docker Hub when credentials are provided as
      # repo secrets. Anonymous pulls share a low rate limit (100 / 6h
      # per IP) that the shared ARC runner exhausts quickly during a
      # multi-image compose; an authenticated account raises it to
      # 200 / 6h for free / 5000 for paid. The login is a no-op when
      # the secrets aren't set, keeping forks working.
      - name: Login to Docker Hub (rate-limit lift)
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Start stack (with retry on Docker Hub rate-limit)
        run: |
          for attempt in 1 2 3; do
            if docker compose up -d --wait; then
              exit 0
            fi
            echo "::warning::compose up failed on attempt $attempt — likely Docker Hub rate-limit. Backing off."
            docker compose down --remove-orphans || true
            sleep $((attempt * 30))
          done
          exit 1
        env:
          APP_BUILD_TARGET: production
      - name: Run database migrations
        run: docker compose --profile setup run --rm db-migrate
      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health && break
            sleep 2
          done
      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        working-directory: app
        env:
          ADMIN_API_KEY: dev_admin_key_2026
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/playwright-report/
          retention-days: 7

  docker:
    name: Docker Build & Scan
    runs-on: arc-runner-pa-webinar
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: pa-webinar:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-filters: runner
          load: true
      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "pa-webinar:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
