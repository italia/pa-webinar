name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint --workspace=app
      - run: npx tsc --noEmit --project app/tsconfig.json

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eventi_dtd_test
          POSTGRES_USER: eventi
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test --workspace=app
        env:
          DATABASE_URL: postgresql://eventi:test@localhost:5432/eventi_dtd_test

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "1"

  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Check forbidden licenses
        run: |
          npx license-checker --production --failOn "GPL-2.0;GPL-3.0;AGPL-3.0;AGPL-3.0-only;SSPL-1.0" --excludePrivatePackages
      - name: Verify license-report.json is up to date
        run: |
          npm run license:report
          git diff --exit-code license-report.json || {
            echo "::error::license-report.json is out of date. Run 'npm run license:report' and commit the result."
            exit 1
          }

  migration-check:
    name: Migration Integrity
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: eventi_dtd_test
          POSTGRES_USER: eventi
          POSTGRES_PASSWORD: test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Apply migrations
        run: npx prisma migrate deploy --schema=app/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://eventi:test@localhost:5432/eventi_dtd_test
      - name: Verify schema is in sync with migrations
        run: |
          npx prisma migrate diff \
            --from-migrations app/prisma/migrations \
            --to-schema-datamodel app/prisma/schema.prisma \
            --shadow-database-url postgresql://eventi:test@localhost:5432/eventi_dtd_test \
            --exit-code
        env:
          DATABASE_URL: postgresql://eventi:test@localhost:5432/eventi_dtd_test

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: eventi-dtd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true
      - name: Run Trivy on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "eventi-dtd:${{ github.sha }}"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
