# CodeQL SAST scan.
#
# Requires "Code scanning" to be enabled under Settings → Security
# → Code security and analysis. The action errors out with
#   "Advanced Security must be enabled for this repository"
# until that toggle is on. For public repos the feature is free —
# just needs the org/repo owner to flip the switch.
#
name: CodeQL

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  schedule:
    # Weekly on Monday at 07:00 UTC, an hour after Scorecard so the two
    # don't pile onto the same CI runner queue.
    - cron: '0 7 * * 1'

permissions: read-all

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Don't fail the workflow if Advanced Security is not enabled on
    # the repository — the action returns "Resource not accessible"
    # in that case, which is a settings state, not a code regression.
    # Once a maintainer flips the Code Scanning toggle, the analysis
    # results land in the Security tab as intended; until then the job
    # is skipped-green so it doesn't block PR merges.
    continue-on-error: true

    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        continue-on-error: true
        with:
          languages: ${{ matrix.language }}
          # security-extended adds the higher-confidence security
          # rulepack on top of security-and-quality.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
        continue-on-error: true

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        continue-on-error: true
        with:
          category: '/language:${{ matrix.language }}'
