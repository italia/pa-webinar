name: Dev build

# Fast dev build: push on the `dev` branch produces rolling
# `:dev` + `:dev-<sha>` images for the app and migration, without SBOM,
# Helm packaging or GitHub release artifacts. Targets a sub-3-minute cycle
# so iteration on the test cluster stays responsive.
#
# Full release pipeline is still release.yml (triggered by `v*` tags) and
# keeps doing the heavy work (SBOM + chart + release notes).
#
# Manual dispatch supports `no_cache=true` to force a clean rebuild when
# layer caching is suspected of serving a stale artifact.
#
# Il job `postprod-worker` builda il container Python con CUDA + WhisperX
# + pyannote + Piper TTS — è MOLTO più pesante (~22GB) e parte solo se
# i sorgenti `infra/ai/` sono cambiati nel push (path filter più sotto).
# Lo isoliamo in un job separato così l'iterazione "veloce" sull'app
# (sub-3min) resta indipendente dal ciclo pesante del worker
# (~25 min build + push). Entrambi i job pushano tag `:dev` mutable +
# `:dev-<sha>` immutable.

on:
  push:
    branches:
      - dev
  workflow_dispatch:
    inputs:
      no_cache:
        description: "Disable buildx layer cache (use for cache poisoning emergencies)"
        type: boolean
        default: false
      force_worker_build:
        description: "Forza il build del postprod worker anche se infra/ai/ non è cambiato"
        type: boolean
        default: false
      force_recorder_build:
        description: "Forza il build del recorder (multi-track ADR-013) anche se infra/recorder/ non è cambiato"
        type: boolean
        default: false
      force_recorder_controller_build:
        description: "Forza il build del recorder-controller anche se infra/recorder-controller/ non è cambiato"
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: italia/pa-webinar
  WORKER_IMAGE_NAME: italia/pa-webinar-postprod-worker
  RECORDER_IMAGE_NAME: italia/pa-webinar-recorder
  RECORDER_CONTROLLER_IMAGE_NAME: italia/pa-webinar-recorder-controller

concurrency:
  # Cancel in-flight dev builds when a new push lands — we only care about
  # the latest HEAD of dev at any time.
  group: dev-build
  cancel-in-progress: true

jobs:
  build-and-push:
    # La quota artefatti di Actions e' dell'ORGANIZZAZIONE, non di questo repo
    # (qui siamo sotto i 50 MB): quando si esaurisce OGNI upload fallisce, e con
    # lui il job — anche a immagine gia' pubblicata. Il "build record" di buildx
    # e' un artefatto per ogni build che nessuno scarica mai.
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    name: Build & Push Dev Image
    runs-on: arc-runner-pa-webinar
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          {
            echo "sha_short=$SHA_SHORT"
            echo "build_date=$BUILD_DATE"
            echo "app_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-$SHA_SHORT"
            echo "migrate_tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-migrate,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-migrate-$SHA_SHORT"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.app_tags }}
          platforms: linux/amd64
          # cache-from/to scoped to `dev` so the release workflow's cache
          # (scope=release) stays isolated and we don't cross-contaminate.
          cache-from: ${{ inputs.no_cache && '' || 'type=gha,scope=dev' }}
          cache-to: ${{ inputs.no_cache && '' || 'type=gha,mode=max,scope=dev' }}
          build-args: |
            NEXT_PUBLIC_BUILD_VERSION=dev
            NEXT_PUBLIC_BUILD_SHA=${{ steps.tags.outputs.sha_short }}
            NEXT_PUBLIC_BUILD_CHANNEL=dev
            NEXT_PUBLIC_BUILD_DATE=${{ steps.tags.outputs.build_date }}
          # Commit-SHA label helps tracing which commit is actually running
          # in the test cluster when the `:dev` tag is ambiguous.
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=dev

      - name: Build and push migration image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          target: builder
          tags: ${{ steps.tags.outputs.migrate_tags }}
          platforms: linux/amd64
          cache-from: ${{ inputs.no_cache && '' || 'type=gha,scope=dev-migrate' }}
          cache-to: ${{ inputs.no_cache && '' || 'type=gha,mode=max,scope=dev-migrate' }}

      - name: Summary
        run: |
          echo "### Dev build pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '| image | tag |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          echo '| app | `dev`, `dev-${{ steps.tags.outputs.sha_short }}` |' >> "$GITHUB_STEP_SUMMARY"
          echo '| migration | `dev-migrate`, `dev-migrate-${{ steps.tags.outputs.sha_short }}` |' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo 'Deploy to test cluster:' >> "$GITHUB_STEP_SUMMARY"
          echo '```sh' >> "$GITHUB_STEP_SUMMARY"
          echo 'kubectl -n videocall-test rollout restart deploy/videocall-test-pa-webinar' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # Postprod AI worker: container Python con CUDA + WhisperX + pyannote
  # + Piper TTS. Image size ~22GB compressi → ~7-10GB pushati su GHCR.
  # Build pesante (~20-25 min cold, ~5-10 min con cache). Lo isoliamo
  # dal build app per non rallentare il cycle "dev iteration" sulla
  # codebase Next.js.
  #
  # Path filter: parte solo se i sorgenti `infra/ai/` o
  # `infra/helm/pa-webinar/templates/cronjob-postprod-*.yaml` sono
  # cambiati nel push, OPPURE su workflow_dispatch con
  # `force_worker_build=true`. Per il primo run, usa workflow_dispatch.
  detect-worker-changes:
    name: Detect postprod worker changes
    runs-on: arc-runner-pa-webinar
    outputs:
      worker_changed: ${{ steps.filter.outputs.worker }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 2
      - name: Filter changed files
        id: filter
        run: |
          # Su workflow_dispatch con flag forzato, build sempre.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force_worker_build }}" = "true" ]; then
            echo "worker=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Su push: diff con HEAD~1 — modifiche sotto infra/ai/ o sui
          # template Helm postprod fanno scattare il build. ECCEZIONE:
          # `infra/ai/local-out/` è una utility di sviluppo (pipeline
          # locale sul 5090) che NON entra nell'immagine worker (il
          # Dockerfile copia solo `worker/`) → la escludiamo dal trigger.
          CHANGED=$(git diff --name-only HEAD~1 HEAD || git ls-files)
          RELEVANT=$(echo "$CHANGED" | grep -E '^(infra/ai/|infra/helm/pa-webinar/templates/cronjob-postprod-)' | grep -vE '^infra/ai/local-out/' || true)
          if [ -n "$RELEVANT" ]; then
            echo "worker=true" >> "$GITHUB_OUTPUT"
          else
            echo "worker=false" >> "$GITHUB_OUTPUT"
          fi

  build-worker:
    # La quota artefatti di Actions e' dell'ORGANIZZAZIONE, non di questo repo
    # (qui siamo sotto i 50 MB): quando si esaurisce OGNI upload fallisce, e con
    # lui il job — anche a immagine gia' pubblicata. Il "build record" di buildx
    # e' un artefatto per ogni build che nessuno scarica mai.
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    name: Build & Push Postprod Worker Image
    needs: detect-worker-changes
    if: needs.detect-worker-changes.outputs.worker_changed == 'true'
    runs-on: arc-runner-pa-webinar
    permissions:
      contents: read
      packages: write
    # Build pesante: il base NGC pytorch image è ~10GB, pyannote+whisperx
    # tirano modelli da HF al runtime ma il pip install è ~5GB. 60 min
    # è un buffer ampio (cold senza cache fa ~25-30 min).
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute worker tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          {
            echo "sha_short=$SHA_SHORT"
            echo "worker_tags=${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:dev,${{ env.REGISTRY }}/${{ env.WORKER_IMAGE_NAME }}:dev-$SHA_SHORT"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./infra/ai
          file: ./infra/ai/Dockerfile.worker
          push: true
          tags: ${{ steps.tags.outputs.worker_tags }}
          platforms: linux/amd64
          # Cache GHA scope dedicato — non condividere con l'app che
          # ha layer diversi e cache-poisoning sarebbe rischioso (un
          # cambio di pytorch base invaliderebbe layer non legati).
          cache-from: ${{ inputs.no_cache && '' || 'type=gha,scope=dev-postprod-worker' }}
          cache-to: ${{ inputs.no_cache && '' || 'type=gha,mode=max,scope=dev-postprod-worker' }}
          labels: |
            org.opencontainers.image.title=pa-webinar-postprod-worker
            org.opencontainers.image.description=Postprod AI worker (WhisperX + pyannote + Piper TTS) for pa-webinar
            org.opencontainers.image.source=https://github.com/italia/pa-webinar
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=dev

      - name: Summary
        run: |
          echo "### Postprod worker image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '| image | tag |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          echo '| postprod-worker | `dev`, `dev-${{ steps.tags.outputs.sha_short }}` |' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo 'Deploy nuovi worker (i Job sono one-shot, picckano la nuova image al prossimo claim):' >> "$GITHUB_STEP_SUMMARY"
          echo '```sh' >> "$GITHUB_STEP_SUMMARY"
          echo '# Nessuna azione: il CronJob orchestrator crea Job nuovi col tag :dev a ogni tick.' >> "$GITHUB_STEP_SUMMARY"
          echo '# Per forzare un re-pull dei nodi GPU già allocati:' >> "$GITHUB_STEP_SUMMARY"
          echo 'kubectl -n videocall-test delete jobs -l app.kubernetes.io/component=postprod-worker' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── Recorder multi-track (ADR-013, Fase 3) ────────────────────────────
  # Bot headless-Chrome (Puppeteer + lib-jitsi-meet) che registra una
  # traccia audio per partecipante. Immagine leggera rispetto al worker
  # (~niente CUDA): builda solo se `infra/recorder/` è cambiato, oppure su
  # workflow_dispatch con force_recorder_build=true.
  detect-recorder-changes:
    name: Detect recorder changes
    runs-on: arc-runner-pa-webinar
    outputs:
      recorder_changed: ${{ steps.filter.outputs.recorder }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 2
      - name: Filter changed files
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force_recorder_build }}" = "true" ]; then
            echo "recorder=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD || git ls-files)
          if echo "$CHANGED" | grep -qE '^infra/recorder/'; then
            echo "recorder=true" >> "$GITHUB_OUTPUT"
          else
            echo "recorder=false" >> "$GITHUB_OUTPUT"
          fi

  build-recorder:
    # La quota artefatti di Actions e' dell'ORGANIZZAZIONE, non di questo repo
    # (qui siamo sotto i 50 MB): quando si esaurisce OGNI upload fallisce, e con
    # lui il job — anche a immagine gia' pubblicata. Il "build record" di buildx
    # e' un artefatto per ogni build che nessuno scarica mai.
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    name: Build & Push Recorder Image
    needs: detect-recorder-changes
    if: needs.detect-recorder-changes.outputs.recorder_changed == 'true'
    runs-on: arc-runner-pa-webinar
    permissions:
      contents: read
      packages: write
    # Niente CUDA: il base è node + Chrome headless. Build ~5-10 min cold.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute recorder tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          {
            echo "sha_short=$SHA_SHORT"
            echo "recorder_tags=${{ env.REGISTRY }}/${{ env.RECORDER_IMAGE_NAME }}:dev,${{ env.REGISTRY }}/${{ env.RECORDER_IMAGE_NAME }}:dev-$SHA_SHORT"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push recorder image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./infra/recorder
          file: ./infra/recorder/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.recorder_tags }}
          platforms: linux/amd64
          cache-from: ${{ inputs.no_cache && '' || 'type=gha,scope=dev-recorder' }}
          cache-to: ${{ inputs.no_cache && '' || 'type=gha,mode=max,scope=dev-recorder' }}
          labels: |
            org.opencontainers.image.title=pa-webinar-recorder
            org.opencontainers.image.description=Multi-track per-participant audio recorder (Puppeteer + lib-jitsi-meet) for pa-webinar
            org.opencontainers.image.source=https://github.com/italia/pa-webinar
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=dev

      - name: Summary
        run: |
          echo "### Recorder image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '| image | tag |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          echo '| recorder | `dev`, `dev-${{ steps.tags.outputs.sha_short }}` |' >> "$GITHUB_STEP_SUMMARY"

  # ── Recorder controller (ADR-013, Fase 3) ─────────────────────────────
  # Operator riconciliante (no Chrome): builda solo se
  # `infra/recorder-controller/` è cambiato, o force_recorder_controller_build=true.
  detect-recorder-controller-changes:
    name: Detect recorder-controller changes
    runs-on: arc-runner-pa-webinar
    outputs:
      changed: ${{ steps.filter.outputs.changed }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 2
      - name: Filter changed files
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.force_recorder_controller_build }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only HEAD~1 HEAD || git ls-files)
          if echo "$CHANGED" | grep -qE '^infra/recorder-controller/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-recorder-controller:
    # La quota artefatti di Actions e' dell'ORGANIZZAZIONE, non di questo repo
    # (qui siamo sotto i 50 MB): quando si esaurisce OGNI upload fallisce, e con
    # lui il job — anche a immagine gia' pubblicata. Il "build record" di buildx
    # e' un artefatto per ogni build che nessuno scarica mai.
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    name: Build & Push Recorder Controller Image
    needs: detect-recorder-controller-changes
    if: needs.detect-recorder-controller-changes.outputs.changed == 'true'
    runs-on: arc-runner-pa-webinar
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          SHA_SHORT="${GITHUB_SHA::7}"
          {
            echo "sha_short=$SHA_SHORT"
            echo "tags=${{ env.REGISTRY }}/${{ env.RECORDER_CONTROLLER_IMAGE_NAME }}:dev,${{ env.REGISTRY }}/${{ env.RECORDER_CONTROLLER_IMAGE_NAME }}:dev-$SHA_SHORT"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push recorder-controller image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./infra/recorder-controller
          file: ./infra/recorder-controller/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          platforms: linux/amd64
          cache-from: ${{ inputs.no_cache && '' || 'type=gha,scope=dev-recorder-controller' }}
          cache-to: ${{ inputs.no_cache && '' || 'type=gha,mode=max,scope=dev-recorder-controller' }}
          labels: |
            org.opencontainers.image.title=pa-webinar-recorder-controller
            org.opencontainers.image.description=Reconciling operator that orchestrates recorder Jobs/containers (ADR-013) for pa-webinar
            org.opencontainers.image.source=https://github.com/italia/pa-webinar
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.ref.name=dev

      - name: Summary
        run: |
          echo "### Recorder controller image pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '| image | tag |' >> "$GITHUB_STEP_SUMMARY"
          echo '|---|---|' >> "$GITHUB_STEP_SUMMARY"
          echo '| recorder-controller | `dev`, `dev-${{ steps.tags.outputs.sha_short }}` |' >> "$GITHUB_STEP_SUMMARY"
