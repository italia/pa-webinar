name: OpenSSF Scorecard
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 06:00 UTC

# NOTE: If the Scorecard step fails with "Resource not accessible by integration",
# the organization needs to either:
#   1. Create a PAT with repo scope and store it as SCORECARD_TOKEN secret, or
#   2. Go to Organization Settings → Actions → General → Workflow permissions
#      and enable "Read repository contents and packages permissions"

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: arc-runner-pa-webinar
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Run Scorecard
        id: scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        continue-on-error: true
        with:
          results_file: results.sarif
          results_format: sarif
          repo_token: ${{ secrets.SCORECARD_TOKEN || secrets.GITHUB_TOKEN }}
          publish_results: true

      - name: Upload to GitHub Security tab
        if: steps.scorecard.outcome == 'success'
        uses: github/codeql-action/upload-sarif@4187e74d05793876e9989daffde9c3e66b4acd07 # v3
        with:
          sarif_file: results.sarif
