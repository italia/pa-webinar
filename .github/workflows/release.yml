name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: italia/eventi-dtd

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: builder
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-migrate
          cache-from: type=gha

      - name: Generate Docker SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate npm SBOM (CycloneDX)
        run: |
          npm ci
          npx @cyclonedx/cyclonedx-npm --workspace app --output-file npm-sbom.json

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sbom.spdx.json
            npm-sbom.json

  helm-package:
    name: Package Helm Chart
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm dependency build infra/helm/eventi-dtd
          helm package infra/helm/eventi-dtd \
            --version "$VERSION" \
            --app-version "$VERSION"

      - name: Upload chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: eventi-dtd-*.tgz
