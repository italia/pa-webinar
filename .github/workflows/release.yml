name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: italia/pa-webinar

jobs:
  build-and-push:
    # La quota artefatti di Actions e' dell'ORGANIZZAZIONE, non di questo repo
    # (qui siamo sotto i 50 MB): quando si esaurisce OGNI upload fallisce, e con
    # lui il job — anche a immagine gia' pubblicata. Il "build record" di buildx
    # e' un artefatto per ogni build che nessuno scarica mai.
    env:
      DOCKER_BUILD_SUMMARY: "false"
      DOCKER_BUILD_RECORD_UPLOAD: "false"
    name: Build & Push Docker Image
    runs-on: arc-runner-pa-webinar
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          # Full history + tags so the release-notes step can diff
          # against the previous tag.
          fetch-depth: 0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Compute build date
        id: build_date
        run: echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BUILD_VERSION=${{ steps.meta.outputs.version }}
            NEXT_PUBLIC_BUILD_SHA=${{ steps.sha.outputs.short }}
            NEXT_PUBLIC_BUILD_CHANNEL=release
            NEXT_PUBLIC_BUILD_DATE=${{ steps.build_date.outputs.iso }}
            # F18: prod serves the PATCHED jitsi/web (ghcr.io/italia/pa-webinar-jitsi-web:stable-10741-rnnoise,
            # noise-suppression AudioContext forced to 48 kHz), so advanced rnnoise no longer silences
            # non-48 kHz mics and is enabled. COUPLING: this ONLY holds while the patched jitsi/web image
            # is the one served — the helm deploy pins it via `--set jitsi-meet.web.image.*` (and the
            # committed values.yaml default), and `--reuse-values` preserves that pin across upgrades.
            # If jitsi/web is ever rolled back to stock, drop this line and re-release so rnnoise is
            # force-OFF again. The static bundle guards (Dockerfile/jitsi-web.yml) prove the patch is
            # PRESENT, not that audio works — always re-validate the mic on a LIVE call after deploy.
            # (dev/test keep the default.)
            NEXT_PUBLIC_JITSI_RNNOISE_ENFORCE=false

      - name: Build and push migration image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          target: builder
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-migrate
          cache-from: type=gha

      - name: Generate Docker SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json
          # L'SBOM viene allegato alla Release qui sotto, che NON consuma la
          # quota artefatti di Actions. Caricarlo anche come artefatto era un
          # doppione, e quando la quota dell'organizzazione si esaurisce quel
          # doppione fa fallire l'intero job — a immagini gia' pubblicate.
          upload-artifact: false

      - name: Generate npm SBOM (CycloneDX)
        continue-on-error: true
        run: |
          npm ci --legacy-peer-deps
          npx @cyclonedx/cyclonedx-npm --workspace app --output-file npm-sbom.json || true

      - name: Generate release notes from git log
        id: notes
        run: |
          CURR="${GITHUB_REF_NAME}"
          PREV="$(git tag --sort=-version:refname | grep -v "^${CURR}$" | head -n1)"

          if [ -z "$PREV" ]; then
            RANGE="HEAD"
            HEADING="## ${CURR}"
          else
            RANGE="${PREV}..HEAD"
            HEADING="## ${CURR} — changes since ${PREV}"
          fi

          # Conventional-commit type → section heading.
          # Anything that doesn't match a known type falls into "Other".
          declare -A SECTIONS=(
            [feat]="Features"
            [fix]="Bug fixes"
            [perf]="Performance"
            [refactor]="Refactoring"
            [docs]="Documentation"
            [ci]="CI / build"
            [chore]="Chores"
            [test]="Tests"
          )
          ORDER=(feat fix perf refactor docs ci chore test)

          : > release-notes.md
          echo "$HEADING" >> release-notes.md
          echo "" >> release-notes.md

          for type in "${ORDER[@]}"; do
            # Match "type(scope): ..." and "type: ..." at start of subject.
            lines="$(git log "$RANGE" --no-merges \
              --pretty=format:"%s|%h" \
              --grep="^${type}(" --grep="^${type}:" || true)"
            if [ -n "$lines" ]; then
              echo "### ${SECTIONS[$type]}" >> release-notes.md
              while IFS='|' read -r subj hash; do
                [ -z "$subj" ] && continue
                # Strip the "type(scope): " or "type: " prefix for readability.
                clean="$(echo "$subj" | sed -E "s/^${type}(\([^)]+\))?: //")"
                echo "- ${clean} (\`${hash}\`)" >> release-notes.md
              done <<< "$lines"
              echo "" >> release-notes.md
            fi
          done

          # "Other": anything since PREV that didn't match the known types.
          other="$(git log "$RANGE" --no-merges --pretty=format:"%s|%h" \
            | grep -Ev "^(feat|fix|perf|refactor|docs|ci|chore|test)(\([^)]+\))?:" \
            || true)"
          if [ -n "$other" ]; then
            echo "### Other" >> release-notes.md
            while IFS='|' read -r subj hash; do
              [ -z "$subj" ] && continue
              echo "- ${subj} (\`${hash}\`)" >> release-notes.md
            done <<< "$other"
            echo "" >> release-notes.md
          fi

          if [ -n "$PREV" ]; then
            echo "**Full diff**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CURR}" >> release-notes.md
          fi

          echo "=== Generated release notes ==="
          cat release-notes.md

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: release-notes.md
          files: |
            sbom.spdx.json
            npm-sbom.json

  helm-package:
    name: Package Helm Chart
    runs-on: arc-runner-pa-webinar
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add jitsi-contrib https://jitsi-contrib.github.io/jitsi-helm/
          helm repo update

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm dependency update infra/helm/pa-webinar
          helm package infra/helm/pa-webinar \
            --version "$VERSION" \
            --app-version "$VERSION"

      - name: Upload chart to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: pa-webinar-*.tgz
