name: Release

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: italia/eventi-dtd

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: arc-runner-eventi-dtd
    permissions:
      contents: write
      packages: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_BUILD_VERSION=${{ steps.meta.outputs.version }}
            NEXT_PUBLIC_BUILD_SHA=${{ steps.sha.outputs.short }}
            NEXT_PUBLIC_BUILD_CHANNEL=release

      - name: Build and push migration image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          target: builder
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-migrate
          cache-from: type=gha

      - name: Generate Docker SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Generate npm SBOM (CycloneDX)
        continue-on-error: true
        run: |
          npm ci --legacy-peer-deps
          npx @cyclonedx/cyclonedx-npm --workspace app --output-file npm-sbom.json || true

      - name: Upload SBOMs to release
        uses: softprops/action-gh-release@v2
        with:
          # Auto-generate release notes from commits/PRs since previous tag.
          # Commit discipline gives us a usable changelog for free; custom
          # formatting (keep-a-changelog etc.) can be layered on later.
          generate_release_notes: true
          files: |
            sbom.spdx.json
            npm-sbom.json

  helm-package:
    name: Package Helm Chart
    runs-on: arc-runner-eventi-dtd
    needs: build-and-push
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4

      - name: Add Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add jitsi-contrib https://jitsi-contrib.github.io/jitsi-helm/
          helm repo update

      - name: Package chart
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm dependency update infra/helm/eventi-dtd
          helm package infra/helm/eventi-dtd \
            --version "$VERSION" \
            --app-version "$VERSION"

      - name: Upload chart to release
        uses: softprops/action-gh-release@v2
        with:
          files: eventi-dtd-*.tgz
