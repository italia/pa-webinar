description:
  it:
    genericName: Piattaforma eventi digitali
    shortDescription: >
      Piattaforma open-source per eventi pubblici digitali della PA, basata su Jitsi Meet e design system .italia.
    longDescription: >
      eventi-dtd è una piattaforma web per organizzare e gestire eventi pubblici digitali — webinar,
      presentazioni, meeting pubblici — con fino a 300 partecipanti simultanei. Utilizza Jitsi Meet
      come motore video/audio self-hosted e il design system .italia per l'interfaccia utente.

      Funzionalità principali: video conferenza integrata, Q&A con upvote, registrazione partecipanti
      GDPR-compliant, registrazione video, moderazione avanzata, inviti email con allegato iCal,
      interfaccia multilingue (24 lingue UE), design system .italia, cloud-native (Kubernetes).
    documentation: "https://github.com/italia/eventi-dtd/tree/main/docs"
    apiDocumentation: "https://github.com/italia/eventi-dtd/blob/main/api/openapi.json"
    features:
      - Video conferenza con Jitsi Meet (fino a 300 partecipanti)
      - Q&A con sistema di upvote
      - Sondaggi, word cloud e reazioni live
      - Registrazione partecipanti GDPR-compliant
      - Registrazione video con consenso esplicito
      - Moderazione avanzata (mute, mani alzate, chat on/off)
      - Email inviti con allegato iCal
      - Interfaccia multilingue (24 lingue UE)
      - Design system .italia (Bootstrap Italia)
      - API REST documentate in OpenAPI 3
      - Cloud-native (Kubernetes, Helm, scale-to-zero)
    screenshots:
      - docs/screenshots/home.png
      - docs/screenshots/event-detail.png
      - docs/screenshots/live-room.png
  en:
    genericName: Digital events platform
    shortDescription: >
      Open-source platform for public digital events, built on Jitsi Meet and the Italian .italia design system.
    longDescription: >
      eventi-dtd is a web platform for organizing and managing public digital events — webinars,
      presentations, public meetings — with up to 300 simultaneous participants. It uses Jitsi Meet
      as a self-hosted video/audio engine and the .italia design system for the user interface.
    documentation: "https://github.com/italia/eventi-dtd/tree/main/docs"
    apiDocumentation: "https://github.com/italia/eventi-dtd/blob/main/api/openapi.json"
    features:
      - Video conferencing with Jitsi Meet (up to 300 participants)
      - Q&A with upvote system
      - Live polls, word cloud and reactions
      - GDPR-compliant participant registration
      - Video recording with explicit consent
      - Advanced moderation (mute, hand raise, chat toggle)
      - Email invitations with iCal attachment
      - Multilingual interface (24 EU languages)
      - .italia design system (Bootstrap Italia)
      - REST APIs documented in OpenAPI 3
      - Cloud-native (Kubernetes, Helm, scale-to-zero)
