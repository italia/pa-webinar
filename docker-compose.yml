# ─────────────────────────────────────────────────────────────
# eventi-dtd — Docker Compose (full local stack)
#
# Usage:
#   docker compose up --build -d          # Start everything
#   docker compose --profile setup run --rm db-migrate  # Migrate + seed
#   docker compose logs -f app            # Watch app logs
#   docker compose down -v                # Stop + remove volumes
# ─────────────────────────────────────────────────────────────

services:

  # ── Next.js Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://eventi:eventi_local_dev@postgres:5432/eventi_dtd
      - NEXT_PUBLIC_JITSI_DOMAIN=localhost:8443
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_DEFAULT_LOCALE=it
      - JITSI_JWT_SECRET=${JITSI_JWT_SECRET:-s3cr3t_dev_only}
      - JITSI_JWT_APP_ID=eventi_dtd
      - JITSI_JWT_ISSUER=eventi-dtd
      - JITSI_JWT_AUDIENCE=jitsi
      # 64-char hex dummy — long enough to satisfy the runtime length
      # check that fail-closes in NODE_ENV=production. NOT a secret:
      # this value is shipped in the public docker-compose.yml and is
      # for local dev / e2e only. Override in real deployments.
      - APP_SECRET=dev_dev_dev_dev_dev_dev_dev_dev_dev_dev_dev_dev_dev_dev_dev_x
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_SECURE=false
      - SMTP_FROM=eventi@dominio.gov.it
      - SMTP_FROM_NAME=Eventi DTD
      - PII_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - DEFAULT_PRIVACY_POLICY_URL=http://localhost:3000/it/privacy
      - CRON_API_KEY=dev_cron_key_change_in_production
      - ADMIN_API_KEY=dev_admin_key_2026
      - JVB_PRE_SCALE_MINUTES=30
      - JVB_MAX_REPLICAS=4
      # Edge-trigger del recorder multi-traccia (opt-in, profilo "recorder").
      # Punta al servizio controller; inerte se il controller non è avviato.
      - RECORDER_CONTROLLER_URL=http://recorder-controller:8080
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Database migration + seed (one-shot) ─────────────────
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    working_dir: /workspace/app
    command: >
      sh -c "npx prisma migrate deploy && npx tsx prisma/seed.ts"
    environment:
      - DATABASE_URL=postgresql://eventi:eventi_local_dev@postgres:5432/eventi_dtd
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["setup"]

  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    # Pulled from Google's Docker Hub mirror to avoid the anonymous
    # pull rate limit on shared CI runners. Same digest as docker.io/library.
    image: mirror.gcr.io/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eventi_dtd
      POSTGRES_USER: eventi
      POSTGRES_PASSWORD: eventi_local_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventi -d eventi_dtd"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Jitsi Meet Stack ─────────────────────────────────────
  # NOTE: In production, Jitsi Web should NOT be directly accessible.
  # Use Kubernetes Ingress rules to restrict access to IFrame API paths only.
  # See docs/ARCHITECTURE.md for the recommended Ingress configuration.

  jitsi-web:
    image: jitsi/web:stable
    restart: unless-stopped
    ports:
      - "8443:443"
    environment:
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=eventi_dtd
      - JWT_APP_SECRET=${JITSI_JWT_SECRET:-s3cr3t_dev_only}
      - JWT_ACCEPTED_ISSUERS=eventi-dtd
      - JWT_ACCEPTED_AUDIENCES=jitsi
      - ENABLE_GUESTS=0
      - PUBLIC_URL=https://localhost:8443
      - TZ=Europe/Rome
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_BOSH_URL_BASE=http://prosody:5280
      - JVB_TCP_HARVESTER_DISABLED=true
    volumes:
      - jitsi_web_config:/config
      - jitsi_web_crontabs:/var/spool/cron/crontabs
      - jitsi_transcripts:/usr/share/jitsi-meet/transcripts
    depends_on:
      - prosody

  prosody:
    image: jitsi/prosody:stable
    restart: unless-stopped
    environment:
      - ENABLE_AUTH=1
      - AUTH_TYPE=jwt
      - JWT_APP_ID=eventi_dtd
      - JWT_APP_SECRET=${JITSI_JWT_SECRET:-s3cr3t_dev_only}
      - JWT_ACCEPTED_ISSUERS=eventi-dtd
      - JWT_ACCEPTED_AUDIENCES=jitsi
      - JWT_ALLOW_EMPTY=0
      - JWT_TOKEN_AUTH_MODULE=token_verification
      - ENABLE_GUESTS=0
      - GLOBAL_MODULES=token_verification
      - XMPP_MUC_MODULES=token_affiliation,token_affiliation_custom
      - TZ=Europe/Rome
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_GUEST_DOMAIN=guest.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_RECORDER_DOMAIN=recorder.meet.jitsi
      - JICOFO_AUTH_PASSWORD=jicofo_pass
      - JVB_AUTH_PASSWORD=jvb_pass
      - JIBRI_XMPP_PASSWORD=jibri_pass
      - JIBRI_RECORDER_PASSWORD=jibri_recorder_pass
    volumes:
      - jitsi_prosody_config:/config
      - ./infra/jitsi/prosody-plugins:/prosody-plugins-custom:ro

  jicofo:
    image: jitsi/jicofo:stable
    restart: unless-stopped
    environment:
      - TZ=Europe/Rome
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_MUC_DOMAIN=muc.meet.jitsi
      - XMPP_SERVER=prosody
      - JICOFO_AUTH_PASSWORD=jicofo_pass
      - AUTH_TYPE=jwt
      - ENABLE_AUTH=1
      - ENABLE_AUTO_OWNER=false
      - JICOFO_ENABLE_AUTO_OWNER=false
      - JICOFO_AUTHENTICATION_TYPE=jwt
      - JICOFO_CONF_INITIAL_PARTICIPANT_WAIT_TIMEOUT=30
      - JICOFO_CONF_SINGLE_PARTICIPANT_TIMEOUT=0
      - JICOFO_AUTH_LIFETIME=86400
    volumes:
      - jitsi_jicofo_config:/config
    depends_on:
      - prosody

  jvb:
    image: jitsi/jvb:stable
    restart: unless-stopped
    ports:
      - "10000:10000/udp"
    environment:
      - TZ=Europe/Rome
      - XMPP_DOMAIN=meet.jitsi
      - XMPP_AUTH_DOMAIN=auth.meet.jitsi
      - XMPP_INTERNAL_MUC_DOMAIN=internal-muc.meet.jitsi
      - XMPP_SERVER=prosody
      - JVB_AUTH_PASSWORD=jvb_pass
      - JVB_PORT=10000
      - JVB_STUN_SERVERS=stun.l.google.com:19302
      - DOCKER_HOST_ADDRESS=${DOCKER_HOST_ADDRESS:-host.docker.internal}
    volumes:
      - jitsi_jvb_config:/config
    depends_on:
      - prosody

  # ── Mailpit (local email testing) ────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  # ── Recorder controller (ADR-013 Fase 3, opt-in: --profile recorder) ──
  # Operator riconciliante in modalità DOCKER: spawna container recorder via
  # socket Docker quando un evento va LIVE (stessa logica del runner K8s).
  # È la variante NON-K8s per il riuso open-source su VM ("full mode").
  # ATTENZIONE: monta /var/run/docker.sock (accesso Docker host) — abilitare
  # solo se si vuole la registrazione multi-traccia.
  recorder-controller:
    build:
      context: ./infra/recorder-controller
      dockerfile: Dockerfile
    environment:
      - RUNNER=docker
      - PORTAL_URL=http://app:3000
      - CRON_API_KEY=dev_cron_key_change_in_production
      # Immagine del bot recorder che il controller avvia (pull da GHCR o
      # build locale: docker build -t eventi-dtd-recorder:local infra/recorder).
      - RECORDER_IMAGE=ghcr.io/italia/eventi-dtd-recorder:dev
      - PORT=8080
      # Network compose a cui agganciare i container recorder, così
      # raggiungono `app` e `jitsi-web`. Default = network di default del
      # progetto compose; adatta se usi un COMPOSE_PROJECT_NAME diverso.
      - DOCKER_NETWORK=${COMPOSE_PROJECT_NAME:-eventi-dtd}_default
      # Env statiche passate a ogni recorder (allowlist passthrough):
      - RECORDER_ENV_JITSI_DOMAIN=localhost:8443
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      app:
        condition: service_healthy
    profiles: ["recorder"]
    restart: unless-stopped

volumes:
  postgres_data:
  jitsi_web_config:
  jitsi_web_crontabs:
  jitsi_transcripts:
  jitsi_prosody_config:
  jitsi_jicofo_config:
  jitsi_jvb_config:
