# Trivy ignore file (https://trivy.dev/latest/docs/configuration/filtering/)
#
# Falso positivo del secret-scanner: il pacchetto `@azure/storage-blob`
# contiene la connection-string PUBBLICA e ben nota dell'emulatore Azurite
# (`UseDevelopmentStorage=true` → account `devstoreaccount1` + AccountKey
# documentata da Microsoft). Finisce nei bundle compilati `.next/` e Trivy la
# segnala come "azure-storage-account-key". NON è un segreto reale: i segreti
# di produzione vivono nei Secret Kubernetes, mai nel codice/immagine.
#
# Ignore SCOPED ai soli artefatti di build Next.js → non sopprime eventuali
# chiavi Azure reali altrove. I segreti veri sono coperti anche da
# GitGuardian (check separato).
secrets:
  - id: azure-storage-account-key
    paths:
      - "**/.next/**"
    statement: "Costante pubblica dell'emulatore Azurite bundlata da @azure/storage-blob; non è un segreto."
